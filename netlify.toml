# Netlify Configuration for ecommerce-frontend

# Build settings
[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# Environment variables for production build
[build.environment]
  REACT_APP_API_URL = "https://rigoula-backend1.onrender.com"

# Development settings
[dev]
  command = "npm start"
  port = 3000

# Redirects - Important pour le routing client-side React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers pour les images avec types MIME corrects
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Content-Type = "image/jpeg"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=31536000, immutable"

# Headers de sécurité et cache pour toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Cache-Control = "public, max-age=3600"

# Cache pour les assets immutables (JS/CSS avec hash)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
