# Netlify Configuration for ecommerce-frontend

# Build settings
[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# Environment variables for production build
[build.environment]
  REACT_APP_API_URL = "https://api.yourdomain.com"  # À remplacer par votre API URL

# Development settings
[dev]
  command = "npm start"
  port = 3000

# Redirects - Important pour le routing client-side React
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

# Cache - Optimisation des assets statiques
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cache pour les assets immutables (JS/CSS avec hash)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Compression des réponses
[[headers]]
  for = "/*"
  [headers.values]
    Content-Encoding = "gzip"
